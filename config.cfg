# QuickTranscriptome — edit paths below, then rerun with only --config:
#
#   python quicktranscriptome.py run --config config.cfg
#   python quicktranscriptome.py run -c config.cfg
#   python quicktranscriptome.py replot --config config.cfg
#
# [replot] inherits every key from [run]; entries under [replot] override [run].
# Command-line options override this file.

[run]
# Required for run (directory containing *.fastq.gz)
reads_dir = ./reads

out_dir = results
species = parapsilosis
threads = 4
resume = true

# Optional: differential expression (requires both)
;metadata = metadata.tsv
;condition_column = condition

# Optional: sample id → plot label map (see labels.tsv example)
;sample_label_map = labels.tsv

# Optional: override reference URLs (otherwise species defaults apply)
;fasta_url =
;gff_url =

# GSEA: provide a GMT file and/or a GAF URL to build GMT from
;gsea_gmt = gene_sets.gmt
;gsea_gaf_url =
gsea_min_size = 10
gsea_max_size = 500
gsea_dotplot_max_terms = 0

de_heatmap_top_per = 25
de_heatmap_padj = 0.05

[replot]
# Defaults come from [run]. Uncomment to override for replot-only.
;resume = false
;out_dir = results
;metadata = metadata.tsv
;condition_column = condition
;sample_label_map = labels.tsv
